<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mutadatum — data for the curious</title>
  <meta name="description" content="mutadatum finds unexpected correlations in everyday data. Each page is one question, one dataset, one answer." />
  <link rel="stylesheet" href="shared.css" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script src="content.js"></script>

  <style>
    .hero {
      padding: 3.5rem 0 2.5rem;
      border-bottom: 1px solid var(--rule);
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: normal;
      line-height: 1.15;
      max-width: 22ch;
      margin-bottom: 1rem;
    }
    .lede {
      font-size: 1.05rem;
      color: var(--ink-mid);
      max-width: 58ch;
      line-height: 1.75;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2.5rem 0;
    }
    .card {
      border: 1px solid var(--rule);
      border-radius: 4px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fff;
    }
    .card:hover { border-color: var(--ink); box-shadow: 3px 3px 0 var(--ink); }
    .card.coming-soon { opacity: 0.6; pointer-events: none; }
    .card-chart {
      height: 160px;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
    }
    .card-chart-inner { width: 100%; height: 100%; }
    .card-chart-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.72rem;
      color: var(--ink-faint); letter-spacing: 0.08em;
    }
    .card-body {
      padding: 1.1rem 1.25rem 1.4rem;
      flex: 1; display: flex; flex-direction: column; gap: 0.5rem;
    }
    .card-eyebrow {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent);
    }
    .card-title {
      font-family: var(--serif); font-size: 1.05rem;
      font-weight: normal; line-height: 1.3; color: var(--ink);
    }
    .card-desc { font-size: 0.82rem; color: var(--ink-mid); line-height: 1.6; flex: 1; }
    .card-cta { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); letter-spacing: 0.06em; margin-top: 0.5rem; }
    .card.coming-soon .card-cta { color: var(--ink-faint); }
  </style>
</head>
<body>

<header class="masthead">
  <div class="container">
    <div class="masthead-inner">
      <a class="site-name" href="/">muta<span>datum</span></a>
      <span class="site-tagline" id="site-tagline"></span>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <section class="hero">
      <p class="eyebrow" id="home-eyebrow"></p>
      <h1 id="home-headline"></h1>
      <p class="lede" id="home-lede"></p>
    </section>
    <div class="grid" id="card-grid"></div>
  </div>
</main>

<footer>
  <div class="container">
    <span id="footer-left"></span>
    <span id="footer-right"></span>
  </div>
</footer>

<script>
  document.getElementById('site-tagline').textContent  = SITE.tagline;
  document.getElementById('home-eyebrow').textContent  = SITE.home.eyebrow;
  document.getElementById('home-headline').textContent = SITE.home.headline;
  document.getElementById('home-lede').textContent     = SITE.home.lede;
  document.getElementById('footer-left').innerHTML     = SITE.footer.left;
  document.getElementById('footer-right').innerHTML    = SITE.footer.right;
  document.title = `${SITE.name} — ${SITE.tagline}`;

  const grid = document.getElementById('card-grid');

  SITE.pages.filter(p => p.status !== 'hidden').forEach((page, idx) => {
    const isLive = page.status === 'live';
    const card = document.createElement(isLive ? 'a' : 'div');
    if (isLive) card.href = `/${page.slug}/`;
    card.className = `card${isLive ? '' : ' coming-soon'}`;
    card.innerHTML = `
      <div class="card-chart" id="chart-${idx}">
        <div class="card-chart-placeholder">${isLive ? 'Loading preview…' : 'Coming soon'}</div>
      </div>
      <div class="card-body">
        <span class="card-eyebrow">${page.eyebrow}</span>
        <span class="card-title">${page.title}</span>
        <span class="card-desc">${page.description}</span>
        <span class="card-cta">${isLive ? 'Explore →' : 'In progress'}</span>
      </div>`;
    grid.appendChild(card);
    if (isLive && page.preview) renderPreview(page.preview, `chart-${idx}`);
  });

  async function renderPreview(cfg, containerId) {
    const container = document.getElementById(containerId);
    try {
      const res = await fetch(cfg.dataFile);
      if (!res.ok || !(await res.clone().json()).length) throw new Error();
      const movies = await res.json();
      container.innerHTML = '<div class="card-chart-inner"></div>';
      const el = container.querySelector('.card-chart-inner');
      const { yes, no } = cfg.colorThresholds;
      const colour = v => v >= yes ? cfg.colors.yes : v <= no ? cfg.colors.no : cfg.colors.maybe;
      Plotly.newPlot(el, [{
        type: 'scatter', mode: 'markers',
        x: movies.map(m => m[cfg.xKey]),
        y: movies.map(m => m[cfg.yKey]),
        hoverinfo: 'none',
        marker: { color: movies.map(m => colour(m[cfg.colorKey])), size: 4, opacity: 0.6 }
      }], {
        paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
        margin: { t: 8, r: 8, b: 8, l: 8 },
        xaxis: { visible: false, type: 'log' },
        yaxis: { visible: false }, showlegend: false,
      }, { staticPlot: true, displayModeBar: false, responsive: true });
    } catch {
      container.innerHTML = '<div class="card-chart-placeholder">Preview unavailable</div>';
    }
  }
</script>
</body>
</html>
